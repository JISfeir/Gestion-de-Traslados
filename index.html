    const SPREADSHEET_ID = 'TU_ID_DE_GOOGLE_SHEET_AQUI';

    function doGet(e) { return handleRequest(e, 'GET'); }
    function doPost(e) { return handleRequest(e, 'POST'); }

    function handleRequest(e, method) {
      const action = e.parameter.action || (method === 'POST' ? JSON.parse(e.postData.contents).action : '');
      const data = method === 'POST' ? JSON.parse(e.postData.contents) : {};
      let result = {};

      try {
        const ss = SpreadsheetApp.openById(SPREADSHEET_ID);
        
        if (action === 'login') {
          const sheet = ss.getSheetByName('Usuarios');
          const rows = sheet.getDataRange().getValues();
          const userRow = rows.slice(1).find(r => r[1] === data.email && r[4] === data.password);
          result = userRow ? { success: true, user: { id: userRow[0], email: userRow[1], nombre: userRow[2], rol: userRow[3] } } : { success: false, error: 'Credenciales incorrectas' };
        }
        else if (action === 'getPacientes') {
          const sheet = ss.getSheetByName('Pacientes');
          const rows = sheet.getDataRange().getValues();
          const headers = rows[0];
          result = rows.slice(1).map(r => { let obj = {}; headers.forEach((h, i) => obj[h] = r[i]); return obj; }).filter(r => r.id);
        }
        else if (action === 'crearPaciente') {
          const sheet = ss.getSheetByName('Pacientes');
          const id = Utilities.getUuid();
          sheet.appendRow([id, data.nombre, data.apellido, data.telefono, data.direccion, data.observaciones, new Date().toISOString()]);
          result = { success: true, id };
        }
        else if (action === 'editarPaciente') {
          const sheet = ss.getSheetByName('Pacientes');
          const rows = sheet.getDataRange().getValues();
          for (let i = 1; i < rows.length; i++) {
            if (rows[i][0] === data.id) {
              sheet.getRange(i + 1, 2, 1, 5).setValues([[data.nombre, data.apellido, data.telefono, data.direccion, data.observaciones]]);
              result = { success: true }; break;
            }
          }
        }
        else if (action === 'getViajes') {
          const sheet = ss.getSheetByName('Viajes');
          const rows = sheet.getDataRange().getValues();
          const headers = rows[0];
          const viajes = rows.slice(1).map(r => { let obj = {}; headers.forEach((h, i) => obj[h] = r[i]); return obj; }).filter(r => r.id);
          const pSheet = ss.getSheetByName('Pacientes');
          const pRows = pSheet.getDataRange().getValues();
          const pHeaders = pRows[0];
          const pacientes = pRows.slice(1).map(r => { let obj = {}; pHeaders.forEach((h, i) => obj[h] = r[i]); return obj; });
          result = viajes.map(v => {
            const p = pacientes.find(pac => pac.id === v.paciente_id);
            return { ...v, paciente_nombre: p ? `${p.nombre} ${p.apellido}` : 'Desconocido' };
          });
        }
        else if (action === 'crearViaje') {
          const sheet = ss.getSheetByName('Viajes');
          const id = Utilities.getUuid();
          sheet.appendRow([id, data.paciente_id, data.fecha_hora, data.origen, data.destino, data.estado || 'Pendiente', data.importe || 0, data.observaciones, new Date().toISOString()]);
          result = { success: true, id };
        }
        else if (action === 'editarViaje') {
          const sheet = ss.getSheetByName('Viajes');
          const rows = sheet.getDataRange().getValues();
          for (let i = 1; i < rows.length; i++) {
            if (rows[i][0] === data.id) {
              sheet.getRange(i + 1, 2, 1, 7).setValues([[data.paciente_id, data.fecha_hora, data.origen, data.destino, data.estado, data.importe, data.observaciones]]);
              result = { success: true }; break;
            }
          }
        }
        else if (action === 'eliminarViaje') {
          const sheet = ss.getSheetByName('Viajes');
          const rows = sheet.getDataRange().getValues();
          for (let i = 1; i < rows.length; i++) {
            if (rows[i][0] === data.id) {
              sheet.deleteRow(i + 1);
              result = { success: true }; break;
            }
          }
        }
        else if (action === 'auditar') {
          let sheet = ss.getSheetByName('Auditoria');
          if (!sheet) { sheet = ss.insertSheet('Auditoria'); sheet.appendRow(['id', 'usuario_id', 'accion', 'fecha']); }
          sheet.appendRow([Utilities.getUuid(), data.usuario_id || '', data.accion, new Date().toISOString()]);
          result = { success: true };
        }
      } catch (err) {
        result = { error: err.toString() };
      }
      
      return ContentService.createTextOutput(JSON.stringify(result)).setMimeType(ContentService.MimeType.JSON);
    }

                <div className="p-6 fade-in">
                    <h2 className="text-2xl font-bold text-gray-800 mb-6">Calendario de Viajes</h2>
                    <div className="bg-white p-4 rounded-xl shadow" ref={calendarRef}></div>

                    {showModal && !editMode && selectedTrip && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md fade-in">
                                <div className="flex justify-between items-center p-6 border-b">
                                    <h3 className="text-xl font-bold text-gray-800">Detalles del Viaje</h3>
                                    <button onClick={() => setShowModal(false)} className="text-gray-400 hover:text-gray-600"><Icons.X /></button>
                                </div>
                                <div className="p-6 space-y-3">
                                    <p className="text-lg font-semibold text-gray-900">{selectedTrip.paciente_nombre}</p>
                                    <p className="text-sm text-gray-600"><strong>Fecha:</strong> {selectedTrip.fecha_hora ? new Date(selectedTrip.fecha_hora).toLocaleString('es-AR') : '-'}</p>
                                    <p className="text-sm text-gray-600"><strong>Origen:</strong> {selectedTrip.origen}</p>
                                    <p className="text-sm text-gray-600"><strong>Destino:</strong> {selectedTrip.destino}</p>
                                    <p className="text-sm text-gray-600"><strong>Importe:</strong> {formatMoney(selectedTrip.importe)}</p>
                                    <p className="text-sm"><strong>Estado:</strong> <span className={`px-2.5 py-1 rounded-full text-xs font-semibold ml-2 ${getStatusColor(selectedTrip.estado)}`}>{selectedTrip.estado}</span></p>
                                    {selectedTrip.observaciones && <p className="text-sm text-gray-600"><strong>Observaciones:</strong> {selectedTrip.observaciones}</p>}
                                </div>
                                <div className="p-6 border-t flex justify-end gap-3">
                                    <button onClick={handleDelete} className="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition">Eliminar</button>
                                    <button onClick={startEdit} className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">Editar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showModal && editMode && form && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg fade-in max-h-[90vh] overflow-y-auto">
                                <div className="flex justify-between items-center p-6 border-b sticky top-0 bg-white">
                                    <h3 className="text-xl font-bold text-gray-800">Editar Viaje</h3>
                                    <button onClick={() => setEditMode(false)} className="text-gray-400 hover:text-gray-600"><Icons.X /></button>
                                </div>
                                <form onSubmit={saveEdit} className="p-6 space-y-4">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Paciente</label>
                                        <input type="text" value={form.paciente_nombre} disabled className="w-full px-3 py-2 border border-gray-300 rounded-lg bg-gray-100" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Fecha y Hora *</label>
                                        <input type="datetime-local" value={form.fecha_hora ? form.fecha_hora.slice(0, 16) : ''} onChange={(e) => setForm({...form, fecha_hora: e.target.value})} required
                                            className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Origen *</label>
                                        <input type="text" value={form.origen} onChange={(e) => setForm({...form, origen: e.target.value})} required
                                            className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Destino *</label>
                                        <input type="text" value={form.destino} onChange={(e) => setForm({...form, destino: e.target.value})} required
                                            className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">Estado</label>
                                            <select value={form.estado} onChange={(e) => setForm({...form, estado: e.target.value})}
                                                className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                                                <option value="Pendiente">Pendiente</option>
                                                <option value="Confirmado">Confirmado</option>
                                                <option value="Completado">Completado</option>
                                                <option value="Cancelado">Cancelado</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">Importe ($)</label>
                                            <div className="relative">
                                                <span className="absolute left-3 top-2.5 text-gray-500">$</span>
                                                <input type="number" step="0.01" min="0" value={form.importe} onChange={(e) => setForm({...form, importe: e.target.value})} placeholder="0.00"
                                                    className="w-full pl-8 pr-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
                                            </div>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Observaciones</label>
                                        <textarea value={form.observaciones} onChange={(e) => setForm({...form, observaciones: e.target.value})} rows="3"
                                            className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                                    </div>
                                    <div className="flex justify-end gap-3 pt-2">
                                        <button type="button" onClick={() => setEditMode(false)} className="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">Cancelar</button>
                                        <button type="submit" className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">Guardar Cambios</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const ContactView = () => {
            const [form, setForm] = useState({ nombre: '', email: '', mensaje: '' });
            const [sent, setSent] = useState(false);

            const handleSubmit = (e) => {
                e.preventDefault();
                setSent(true);
                setTimeout(() => setSent(false), 3000);
                setForm({ nombre: '', email: '', mensaje: '' });
            };

            return (
                <div className="p-6 fade-in">
                    <h2 className="text-2xl font-bold text-gray-800 mb-6">Contáctanos</h2>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                        <div className="bg-white p-6 rounded-xl shadow flex items-start gap-4">
                            <div className="bg-blue-100 p-3 rounded-lg text-blue-600"><Icons.Phone /></div>
                            <div>
                                <h3 className="font-semibold text-gray-800">Teléfono</h3>
                                <p className="text-gray-600 text-sm">+54 11 4567-8900</p>
                            </div>
                        </div>
                        <div className="bg-white p-6 rounded-xl shadow flex items-start gap-4">
                            <div className="bg-emerald-100 p-3 rounded-lg text-emerald-600"><Icons.Mail /></div>
                            <div>
                                <h3 className="font-semibold text-gray-800">Correo electrónico</h3>
                                <p className="text-gray-600 text-sm">contacto@labtraslados.com</p>
                            </div>
                        </div>
                        <div className="bg-white p-6 rounded-xl shadow flex items-start gap-4">
                            <div className="bg-purple-100 p-3 rounded-lg text-purple-600"><Icons.MapPin /></div>
                            <div>
                                <h3 className="font-semibold text-gray-800">Dirección</h3>
                                <p className="text-gray-600 text-sm">Av. Salud 1234, CABA, Argentina</p>
                            </div>
                        </div>
                    </div>

                    <div className="bg-white p-8 rounded-xl shadow max-w-2xl">
                        <h3 className="text-xl font-bold text-gray-800 mb-4">Envíanos un mensaje</h3>
                        {sent && <div className="bg-green-50 text-green-700 p-3 rounded-lg mb-4 text-sm">✓ Mensaje enviado correctamente. Nos pondremos en contacto pronto.</div>}
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">Nombre</label>
                                <input type="text" value={form.nombre} onChange={(e) => setForm({...form, nombre: e.target.value})} required
                                    className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">Correo electrónico</label>
                                <input type="email" value={form.email} onChange={(e) => setForm({...form, email: e.target.value})} required
                                    className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">Mensaje</label>
                                <textarea value={form.mensaje} onChange={(e) => setForm({...form, mensaje: e.target.value})} rows="4" required
                                    className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                            </div>
                            <button type="submit" className="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-lg transition font-medium">Enviar Mensaje</button>
                        </form>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('login');
            const [patients, setPatients] = useState([]);
            const [trips, setTrips] = useState([]);
            const [isLoading, setIsLoading] = useState(false);

            const loadData = async () => {
                setIsLoading(true);
                try {
                    const [pRes, tRes] = await Promise.all([
                        apiCall('getPacientes'),
                        apiCall('getViajes')
                    ]);
                    if (pRes && !pRes.error) setPatients(pRes);
                    if (tRes && !tRes.error) setTrips(tRes);
                } catch (e) {
                    console.error('Error cargando datos:', e);
                }
                setIsLoading(false);
            };

            useEffect(() => {
                const savedUser = localStorage.getItem('currentUser');
                if (savedUser) { 
                    setUser(JSON.parse(savedUser)); 
                    setView('dashboard');
                    loadData();
                }

                const handleRefresh = () => loadData();
                window.addEventListener('refreshData', handleRefresh);
                return () => window.removeEventListener('refreshData', handleRefresh);
            }, []);

            const addAudit = async (accion) => {
                await apiCall('auditar', { usuario_id: user?.id, accion });
            };

            const handleLogin = (u) => {
                setUser(u);
                localStorage.setItem('currentUser', JSON.stringify(u));
                setView('dashboard');
                loadData();
            };

            const handleLogout = () => {
                setUser(null);
                localStorage.removeItem('currentUser');
                setView('login');
            };

            if (!user || view === 'login') return <LoginView onLogin={handleLogin} setIsLoading={setIsLoading} />;

            const navItems = [
                { id: 'dashboard', label: 'Inicio', icon: <Icons.FileText /> },
                { id: 'patients', label: 'Pacientes', icon: <Icons.Users /> },
                { id: 'trips', label: 'Viajes', icon: <Icons.Car /> },
                { id: 'calendar', label: 'Calendario', icon: <Icons.Calendar /> },
                { id: 'contact', label: 'Contacto', icon: <Icons.Mail /> },
            ];

            return (
                <div className="min-h-screen flex">
                    {isLoading && <LoadingSpinner />}
                    <aside className="w-64 bg-slate-900 text-white flex flex-col fixed h-full z-40">
                        <div className="p-6 border-b border-slate-800 flex items-center gap-3">
                            <div className="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center">
                                <Icons.Car />
                            </div>
                            <div>
                                <h1 className="font-bold text-lg leading-tight">EllaVa</h1>
                                <p className="text-xs text-slate-400">Gestión de Traslados</p>
                            </div>
                        </div>
                        <nav className="flex-1 p-4 space-y-1">
                            {navItems.map(item => (
                                <button key={item.id} onClick={() => setView(item.id)}
                                    className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition ${view === item.id ? 'bg-blue-600 text-white' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}`}>
                                    {item.icon} {item.label}
                                </button>
                            ))}
                        </nav>
                        <div className="p-4 border-t border-slate-800">
                            <div className="flex items-center gap-3 mb-3 px-2">
                                <div className="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-sm font-bold">{user.nombre[0]}</div>
                                <div className="flex-1 min-w-0">
                                    <p className="text-sm font-medium truncate">{user.nombre}</p>
                                    <p className="text-xs text-slate-400 truncate">{user.email}</p>
                                </div>
                            </div>
                            <button onClick={handleLogout} className="w-full flex items-center gap-2 px-4 py-2 text-sm text-slate-300 hover:bg-slate-800 rounded-lg transition">
                                <Icons.LogOut /> Cerrar Sesión
                            </button>
                        </div>
                    </aside>

                    <main className="flex-1 ml-64">
                        {view === 'dashboard' && <DashboardView setView={setView} patients={patients} trips={trips} />}
                        {view === 'patients' && <PatientView patients={patients} setPatients={setPatients} addAudit={addAudit} setIsLoading={setIsLoading} />}
                        {view === 'trips' && <TripView trips={trips} setTrips={setTrips} patients={patients} addAudit={addAudit} setIsLoading={setIsLoading} user={user} />}
                        {view === 'calendar' && <CalendarView trips={trips} setTrips={setTrips} patients={patients} addAudit={addAudit} setIsLoading={setIsLoading} />}
                        {view === 'contact' && <ContactView />}
                    </main>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
```
